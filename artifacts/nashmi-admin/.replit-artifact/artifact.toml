kind = "web"
previewPath = "/admin/"
title = "نشمي سوق - Admin Dashboard"
version = "1.0.0"
id = "artifacts/nashmi-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admin/" ]
localPort = 18745

[services.development]
run = "pnpm --filter @workspace/nashmi-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nashmi-admin", "run", "build" ]
publicDir = "artifacts/nashmi-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18745"
BASE_PATH = "/admin/"
